<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="S Plänterwald">
    <title>S Plänterwald – Abfahrtsmonitor</title>
    <style>
        @font-face {
            font-family: 'DB Head';
            src: url('font/DB Head Regular.otf') format('opentype');
            font-weight: 400; font-style: normal;
        }
        @font-face {
            font-family: 'DBAG One';
            src: url('font/DeutscheBahnAG-One.ttf') format('truetype');
        }
        @font-face {
            font-family: 'DBAG Four';
            src: url('font/DeutscheBahnAG-Four.ttf') format('truetype');
        }

        :root {
            --bg: #032E63;
            --bg-dark: #021e42;
            --white: #ffffff;
            --sep: rgba(255,255,255,0.28);
            --pad: 44px;
            --col-left: 270px;
            --col-right: 140px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body {
            width:100%; height:100%; overflow:hidden;
            font-family: 'DB Head', Arial, sans-serif;
            background: var(--bg); color: var(--white);
            touch-action: manipulation;
        }
        body { display:flex; flex-direction:column; }

        /* ── Station Name ── */
        .station-name {
            text-align:center; font-size:60px;
            padding:24px 0 18px; letter-spacing:1px;
        }
        .sep { border:none; border-top:1px solid var(--sep); margin:0 var(--pad); }

        /* ── Header Bar ── */
        .header-bar {
            display:flex; align-items:center;
            padding:12px var(--pad); gap:16px;
        }
        .hdr-clock {
            display:flex; align-items:center; gap:10px;
            min-width:var(--col-left);
        }
        .clock-svg { width:32px; height:32px; flex-shrink:0; }
        .clock-time { font-size:32px; }
        .hdr-label { flex:1; font-size:30px; }
        .hdr-label em { font-style:italic; }
        .db-logo {
            font-family:'DBAG One'; font-size:48px;
            flex-shrink:0; line-height:1;
        }

        /* ── Column Headers ── */
        .col-headers {
            display:flex; padding:8px var(--pad) 10px;
            font-size:15px; color:rgba(255,255,255,0.85);
            line-height:1.5;
        }
        .col-hdr-left { min-width:var(--col-left); }
        .col-hdr-mid { flex:1; }
        .col-hdr-right { min-width:var(--col-right); text-align:right; }

        /* ── Departures ── */
        .dep-section {
            flex:1; display:flex; flex-direction:column;
            justify-content:flex-start; padding-top:2px;
            overflow:hidden;
        }
        .dep-entry {
            padding:6px var(--pad) 10px;
            cursor:pointer; transition:background 0.15s;
        }
        .dep-entry:active { background:rgba(255,255,255,0.06); }
        .dep-entry.cancelled .dep-lg .col-l,
        .dep-entry.cancelled .dep-lg .col-m {
            text-decoration:line-through; opacity:0.45;
        }
        .dep-sm {
            display:flex; font-size:17px;
            color:rgba(255,255,255,0.75); margin-bottom:1px;
        }
        .dep-sm .col-l { min-width:var(--col-left); display:flex; align-items:center; gap:6px; }
        .dep-sm .col-m { flex:1; }
        .dep-lg { display:flex; align-items:baseline; }
        .dep-lg .col-l {
            min-width:var(--col-left); font-size:48px;
            display:flex; align-items:baseline; gap:12px;
        }
        .dep-lg .col-m { flex:1; font-size:38px; }
        .dep-lg .col-r {
            min-width:var(--col-right); text-align:right; font-size:48px;
        }

        /* S-Bahn line icon */
        .sbahn-glyph { font-size:32px; line-height:1; vertical-align:middle; }
        .sbahn-glyph.dbag-one { font-family:'DBAG One'; }
        .sbahn-glyph.dbag-four { font-family:'DBAG Four'; }
        .sbahn-dir { font-size:17px; color:rgba(255,255,255,0.75); margin-right:6px; }

        .delay-badge {
            display:inline-block; background:var(--white);
            color:var(--bg); font-size:18px;
            padding:2px 8px; border-radius:0;
            vertical-align:middle; position:relative; top:-4px;
        }
        .cancelled-badge {
            display:inline-block; background:#cc0000;
            color:var(--white); font-size:16px;
            padding:2px 8px; border-radius:0;
            vertical-align:middle; position:relative; top:-4px;
        }
        .no-data {
            font-size:24px; text-align:center;
            color:rgba(255,255,255,0.45); padding:40px var(--pad);
        }

        /* ── Bottom Bar ── */
        .bottom-bar {
            display:flex; align-items:center;
            padding:14px var(--pad); gap:20px;
        }
        .disrupt-area {
            flex:1; cursor:pointer;
            font-size:18px; font-style:italic;
            color:rgba(255,255,255,0.75);
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .disrupt-area:active { color:var(--white); }
        .disrupt-area.warn { color:#f0a030; }
        .bus-btn {
            cursor:pointer; flex-shrink:0;
            font-size:28px; color:var(--white);
            transition:opacity 0.15s;
            font-family:'DB Head', Arial, sans-serif;
        }
        .bus-btn:active { opacity:0.6; }

        /* ── Modals ── */
        .modal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,20,0.75); z-index:100;
            align-items:center; justify-content:center;
        }
        .modal-overlay.active { display:flex; }
        .modal {
            background:var(--bg); border:2px solid rgba(255,255,255,0.35);
            border-radius:0; width:88%; max-width:780px; max-height:82vh;
            overflow-y:auto;
        }
        .modal-header {
            display:flex; align-items:center; justify-content:space-between;
            padding:18px 26px; background:var(--bg-dark);
            border-bottom:1px solid var(--sep);
        }
        .modal-title { font-size:26px; }
        .modal-close {
            width:42px; height:42px;
            background:rgba(255,255,255,0.12); border:none;
            color:var(--white); font-size:22px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        }
        .modal-close:active { background:rgba(255,255,255,0.25); }
        .modal-body { padding:22px 26px; }

        .detail-row {
            display:flex; padding:11px 0;
            border-bottom:1px solid rgba(255,255,255,0.1); font-size:21px;
        }
        .detail-label { min-width:170px; color:rgba(255,255,255,0.6); }
        .detail-value { flex:1; }

        .bus-entry { padding:10px 0 14px; border-bottom:1px solid var(--sep); }
        .bus-entry:last-child { border-bottom:none; }
        .bus-sm { font-size:17px; color:rgba(255,255,255,0.75); margin-bottom:2px; }
        .bus-lg { display:flex; align-items:baseline; }
        .bus-lg .bl { min-width:160px; font-size:36px; display:flex; align-items:baseline; gap:10px; }
        .bus-lg .bm { flex:1; font-size:30px; }

        .disruption-item {
            padding:14px; background:rgba(255,165,0,0.08);
            border-left:4px solid #f0a030; margin-bottom:10px;
        }
        .disruption-item-title { font-size:20px; color:#f0a030; margin-bottom:6px; }
        .disruption-item-text { font-size:17px; color:rgba(255,255,255,0.85); line-height:1.5; }

        .error-ind {
            position:fixed; top:12px; right:12px;
            background:#cc0000; color:var(--white); padding:6px 14px;
            font-size:13px; z-index:50; display:none;
        }
        .error-ind.visible { display:block; }
    </style>
</head>
<body>

    <!-- Station Name -->
    <div class="station-name">S Plänterwald</div>
    <hr class="sep">

    <!-- Header Bar -->
    <div class="header-bar">
        <div class="hdr-clock">
            <svg class="clock-svg" viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2"/>
                <line id="clock-hr" x1="20" y1="20" x2="20" y2="8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                <line id="clock-min" x1="20" y1="20" x2="20" y2="5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <div class="clock-time" id="clock">--:--</div>
        </div>
        <div class="hdr-label">Abfahrt&ensp;<em>Departure</em></div>
        <div class="db-logo">.</div>
    </div>
    <hr class="sep">

    <!-- Column Headers -->
    <div class="col-headers">
        <div class="col-hdr-left">
            <div>Zug / <em>Train</em></div>
            <div>Zeit / <em>Time</em></div>
        </div>
        <div class="col-hdr-mid">
            <div>Über / <em>Via</em></div>
            <div>Ziel / <em>Destination</em></div>
        </div>
        <div class="col-hdr-right">
            <div>Gleis / <em>Track</em></div>
        </div>
    </div>
    <hr class="sep">

    <!-- Departures -->
    <div class="dep-section" id="departures">
        <div class="no-data">Daten werden geladen…</div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <div class="disrupt-area" id="disrupt-area">Störungsinformationen werden geladen…</div>
        <div class="bus-btn" id="bus-btn">BUS</div>
    </div>

    <!-- Departure Detail Modal -->
    <div class="modal-overlay" id="dep-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Abfahrt Detail</div>
                <button class="modal-close" id="dep-modal-close">✕</button>
            </div>
            <div class="modal-body" id="dep-modal-body"></div>
        </div>
    </div>

    <!-- Disruption Detail Modal -->
    <div class="modal-overlay" id="dis-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Aktuelle Störungen</div>
                <button class="modal-close" id="dis-modal-close">✕</button>
            </div>
            <div class="modal-body" id="dis-modal-body"></div>
        </div>
    </div>

    <!-- Bus Modal -->
    <div class="modal-overlay" id="bus-modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Köpenicker Landstr./Dammweg → Nord</div>
                <button class="modal-close" id="bus-modal-close">✕</button>
            </div>
            <div class="modal-body" id="bus-modal-body">
                <div class="no-data">Busdaten werden geladen…</div>
            </div>
        </div>
    </div>

    <div class="error-ind" id="error-ind">Verbindungsfehler</div>

    <script>
    (function() {
        'use strict';

        const API = 'https://v6.bvg.transport.rest';
        const SBAHN_ID = '900191002';
        const BUS_ID = '900191511';
        const REFRESH_MS = 30000;
        const MAX_DEPS = 6;

        const LINE_COLORS = {
            S1:'#DD6BA1',S2:'#005F27',S25:'#005F27',S26:'#005F27',
            S3:'#0A4F8B',S41:'#A23B1F',S42:'#C46117',
            S45:'#C88B37',S46:'#C88B37',S47:'#C88B37',
            S5:'#FF5900',S7:'#6E3B90',S75:'#6E3B90',
            S8:'#6DB540',S85:'#6DB540',S9:'#8B1C62'
        };
        const SOUTHBOUND = ['schöneweide','köpenick','müggelschlößchenweg','grünau','adlershof','rudow','bohnsdorf'];

        let depData = [];
        let disruptData = [];

        // --- Helpers ---
        function berlinNow() {
            return new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Berlin'}));
        }
        function fmtTime(iso) {
            if (!iso) return '--:--';
            const d = new Date(iso);
            return d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'});
        }
        function fmtTimeShort(iso) {
            if (!iso) return '--:--';
            const d = new Date(iso);
            const h = parseInt(d.toLocaleString('en-US',{hour:'numeric',hour12:false,timeZone:'Europe/Berlin'}));
            const m = String(d.toLocaleString('en-US',{minute:'2-digit',timeZone:'Europe/Berlin'})).padStart(2,'0');
            return h+':'+m;
        }
        function delayMin(s) { return s ? Math.round(s/60) : 0; }
        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
        function sanitizeHtml(s) {
            if (!s) return '';
            return s.replace(/<a\s+href="(https?:\/\/[^"]+)"[^>]*>(.*?)<\/a>/gi,
                function(_,url,text) { return '<a href="'+esc(url)+'" target="_blank" rel="noopener" style="color:#6cb4ee;text-decoration:underline">'+esc(text)+'</a>'; })
                .replace(/<br\s*\/?>/gi,'<br>')
                .replace(/<(?!\/?a[ >]|\/?br>)[^>]*>/gi,'');
        }
        function lineColor(name) { return LINE_COLORS[name] || '#999'; }
        const LINE_GLYPHS = {
            S8:  {char:'H', font:'dbag-one'},
            S9:  {char:'I', font:'dbag-one'},
            S85: {char:'k', font:'dbag-four'}
        };
        function sbahnIcon(lineName, platform) {
            const color = lineColor(lineName);
            const g = LINE_GLYPHS[lineName];
            const dirLabel = platform==='3'?'Südliche ':'Nördliche ';
            if (g) {
                return '<span class="sbahn-dir">'+dirLabel+'</span><span class="sbahn-glyph '+g.font+'" style="color:'+color+'">'+g.char+'</span>';
            }
            return '<span class="sbahn-dir">'+dirLabel+'</span><span class="sbahn-glyph dbag-one" style="color:'+color+'">'+esc(lineName)+'</span>';
        }
        function isNorthbound(dir) {
            if (!dir) return false;
            const l = dir.toLowerCase();
            return !SOUTHBOUND.some(p => l.includes(p));
        }

        // --- Clock ---
        function tick() {
            const now = berlinNow();
            const h = now.getHours(), m = now.getMinutes();
            document.getElementById('clock').textContent =
                String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
            document.getElementById('clock-hr').setAttribute('transform','rotate('+((h%12)*30+m*0.5)+',20,20)');
            document.getElementById('clock-min').setAttribute('transform','rotate('+(m*6)+',20,20)');
        }
        tick(); setInterval(tick,1000);

        // --- BVG REST API (CORS ✓) ---
        async function fetchSBahn() {
            const p = new URLSearchParams({
                duration:'120',results:'20',remarks:'true',
                suburban:'true',bus:'false',tram:'false',
                subway:'false',express:'false',ferry:'false',regional:'false'
            });
            const r = await fetch(API+'/stops/'+SBAHN_ID+'/departures?'+p);
            if (!r.ok) throw new Error(r.status);
            const d = await r.json();
            return Array.isArray(d) ? d : (d.departures||[]);
        }

        async function fetchBus() {
            const p = new URLSearchParams({
                duration:'120',results:'20',remarks:'true',
                bus:'true',suburban:'false',tram:'false',
                subway:'false',express:'false',ferry:'false',regional:'false'
            });
            const r = await fetch(API+'/stops/'+BUS_ID+'/departures?'+p);
            if (!r.ok) throw new Error(r.status);
            const d = await r.json();
            return Array.isArray(d) ? d : (d.departures||[]);
        }

        // --- Disruption extraction ---
        function extractDisruptions(deps) {
            const seen = new Set();
            const out = [];
            for (const dep of deps) {
                if (dep.cancelled) {
                    const k = 'c-'+(dep.line?.name||'')+'-'+(dep.direction||'');
                    if (!seen.has(k)) {
                        seen.add(k);
                        out.push({type:'cancellation',line:dep.line?.name,
                            summary:(dep.line?.name||'Zug')+' Ri. '+(dep.direction||'?')+' fällt aus',
                            text:dep.remarks?.find(r=>r.type==='status')?.text||'Zug fällt aus'});
                    }
                }
                if (dep.remarks) {
                    for (const rm of dep.remarks) {
                        if (rm.type==='warning'||(rm.type==='status'&&dep.cancelled)) {
                            const k = rm.summary||rm.text||'';
                            if (k&&!seen.has(k)) {
                                seen.add(k);
                                out.push({type:rm.type,line:dep.line?.name,
                                    summary:rm.summary||(rm.text||'').substring(0,120),
                                    text:rm.text||rm.summary||''});
                            }
                        }
                    }
                }
            }
            return out;
        }

        // --- Render departures (Gleis 3 + 4) ---
        function renderDeps(deps) {
            const el = document.getElementById('departures');
            const sbahn = deps.filter(d =>
                d.platform==='3'||d.platform==='4'||d.plannedPlatform==='3'||d.plannedPlatform==='4'
            );
            const upcoming = sbahn.slice(0, MAX_DEPS);
            depData = upcoming;

            if (!upcoming.length) { el.innerHTML='<div class="no-data">Keine Abfahrten</div>'; return; }

            el.innerHTML = upcoming.map((d,i) => {
                const line = d.line?.name||'';
                const dir = d.direction||'';
                const platform = d.platform||d.plannedPlatform||'';
                // Skip entries with missing essential info
                if (!line||!dir||!d.plannedWhen||!platform) return '';
                const plannedTime = fmtTimeShort(d.plannedWhen);
                const isCx = !!d.cancelled;
                const dm = delayMin(d.delay);
                const actualTime = d.when ? fmtTime(d.when) : null;

                let badge = '';
                if (isCx) badge = '<span class="cancelled-badge">Fällt aus</span>';
                else if (dm>0 && actualTime) badge = '<span class="delay-badge">'+actualTime+'</span>';

                return '<div class="dep-entry'+(isCx?' cancelled':'')+'" data-idx="'+i+'">'+
                    '<div class="dep-sm">'+
                        '<div class="col-l">'+sbahnIcon(line,platform)+'</div>'+
                        '<div class="col-m"></div>'+
                    '</div>'+
                    '<div class="dep-lg">'+
                        '<div class="col-l">'+plannedTime+' '+badge+'</div>'+
                        '<div class="col-m">'+esc(dir)+'</div>'+
                        '<div class="col-r">'+esc(platform)+'</div>'+
                    '</div>'+
                '</div><hr class="sep">';
            }).join('');

            el.querySelectorAll('.dep-entry').forEach(row => {
                row.addEventListener('click',()=>showDepDetail(+row.dataset.idx));
            });
        }

        // --- Render disruptions ---
        function renderDisruptions(list) {
            disruptData = list;
            const el = document.getElementById('disrupt-area');
            if (!list.length) { el.textContent='Keine aktuellen Störungen'; el.className='disrupt-area'; }
            else { el.textContent=list.map(d=>d.summary).join(' · '); el.className='disrupt-area warn'; }
        }

        // --- Departure detail modal ---
        function showDepDetail(idx) {
            const d = depData[idx]; if (!d) return;
            const line = d.line?.name||'?';
            const platform = d.platform||d.plannedPlatform||'';
            const dm = delayMin(d.delay);
            const isCx = !!d.cancelled;
            let remarksHtml = (d.remarks||[]).filter(r=>r.text).map(r =>
                '<div style="padding:4px 0;color:'+(r.type==='warning'?'#f0a030':'rgba(255,255,255,0.85)')+'">'+sanitizeHtml(r.text)+'</div>'
            ).join('');

            document.getElementById('dep-modal-body').innerHTML =
                '<div class="detail-row"><div class="detail-label">Linie</div><div class="detail-value" style="font-size:24px">'+sbahnIcon(line,platform)+' '+esc(line)+'</div></div>'+
                '<div class="detail-row"><div class="detail-label">Richtung</div><div class="detail-value">'+esc(d.direction||'—')+'</div></div>'+
                '<div class="detail-row"><div class="detail-label">Gleis</div><div class="detail-value">'+esc(d.platform||d.plannedPlatform||'—')+'</div></div>'+
                '<div class="detail-row"><div class="detail-label">Planmäßig</div><div class="detail-value">'+fmtTime(d.plannedWhen)+'</div></div>'+
                '<div class="detail-row"><div class="detail-label">Voraussichtlich</div><div class="detail-value" style="color:'+(dm>0?'#FF4444':'#66dd88')+'">'+fmtTime(d.when||d.plannedWhen)+(dm>0?' (+'+dm+' Min)':' (pünktlich)')+'</div></div>'+
                (isCx?'<div class="detail-row"><div class="detail-label">Status</div><div class="detail-value" style="color:#cc0000">FÄLLT AUS</div></div>':'')+
                (remarksHtml?'<div class="detail-row" style="flex-direction:column"><div class="detail-label" style="margin-bottom:6px">Hinweise</div><div class="detail-value">'+remarksHtml+'</div></div>':'');
            openModal('dep-modal');
        }

        // --- Disruption detail modal ---
        function showDisruptDetail() {
            const body = document.getElementById('dis-modal-body');
            if (!disruptData.length) {
                body.innerHTML='<div style="text-align:center;color:#66dd88;padding:24px;font-size:22px">Keine aktuellen Störungen</div>';
            } else {
                body.innerHTML = disruptData.map(d =>
                    '<div class="disruption-item"><div class="disruption-item-title">'+(d.line?'<span style="margin-right:6px">'+esc(d.line)+'</span>':'')+esc(d.summary)+'</div><div class="disruption-item-text">'+sanitizeHtml(d.text)+'</div></div>'
                ).join('');
            }
            openModal('dis-modal');
        }

        // --- Bus modal ---
        async function showBusModal() {
            openModal('bus-modal');
            const body = document.getElementById('bus-modal-body');
            body.innerHTML='<div class="no-data">Busdaten werden geladen…</div>';
            try {
                const deps = await fetchBus();
                const nb = deps.filter(d=>!d.cancelled&&isNorthbound(d.direction));
                const up = nb.slice(0,4);
                if (!up.length) { body.innerHTML='<div class="no-data">Keine Busse Richtung Nord</div>'; return; }
                body.innerHTML = up.map(d => {
                    const dm = delayMin(d.delay);
                    const plannedTime = fmtTimeShort(d.plannedWhen);
                    const actualTime = d.when ? fmtTime(d.when) : null;
                    let badge = '';
                    if (dm>0 && actualTime) badge = '<span class="delay-badge" style="font-size:15px;top:-2px">'+actualTime+'</span>';
                    return '<div class="bus-entry"><div class="bus-sm">Bus '+esc(d.line?.name||'?')+'</div><div class="bus-lg"><div class="bl">'+plannedTime+' '+badge+'</div><div class="bm">'+esc(d.direction||'')+'</div></div></div>';
                }).join('');
            } catch(e) {
                body.innerHTML='<div class="no-data" style="color:rgba(255,255,255,0.5)">Busdaten derzeit nicht verfügbar</div>';
            }
        }

        // --- Modal helpers ---
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        document.querySelectorAll('.modal-overlay').forEach(ov => {
            ov.addEventListener('click',e=>{ if(e.target===ov) ov.classList.remove('active'); });
        });
        document.getElementById('dep-modal-close').addEventListener('click',()=>closeModal('dep-modal'));
        document.getElementById('dis-modal-close').addEventListener('click',()=>closeModal('dis-modal'));
        document.getElementById('bus-modal-close').addEventListener('click',()=>closeModal('bus-modal'));

        document.getElementById('disrupt-area').addEventListener('click',showDisruptDetail);
        document.getElementById('bus-btn').addEventListener('click',showBusModal);

        // --- Main refresh ---
        async function refresh() {
            try {
                const deps = await fetchSBahn();
                renderDeps(deps);
                renderDisruptions(extractDisruptions(deps));
                document.getElementById('error-ind').classList.remove('visible');
            } catch(e) {
                console.error('Refresh failed:',e);
                document.getElementById('error-ind').classList.add('visible');
            }
        }

        refresh();
        setInterval(refresh, REFRESH_MS);
    })();
    </script>
</body>
</html>
